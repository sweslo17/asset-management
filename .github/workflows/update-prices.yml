# =============================================================================
# DEPRECATED（Sheets→D1 遷移後停用）
# 價格/匯率更新已改由 Cloudflare Worker Cron Trigger 處理（見 worker/wrangler.toml
# [triggers] 與 worker/src/index.ts 的 scheduled()）。
# 此 workflow 已移除排程，僅保留手動觸發以備不時之需；確認新流程運作後可整檔刪除，
# 並刪掉 repo 的 GOOGLE_SERVICE_ACCOUNT_JSON / GOOGLE_SHEETS_ID secrets。
# =============================================================================
name: Update Prices & Exchange Rates (DEPRECATED)

on:
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        working-directory: scripts
        run: poetry install --no-interaction --no-root

      - name: Write service account JSON
        working-directory: scripts
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Run price updater
        working-directory: scripts
        env:
          PORTFOLIO_GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          PORTFOLIO_SERVICE_ACCOUNT_JSON_PATH: service-account.json
        run: PYTHONPATH=src poetry run python -m portfolio_updater.main

      - name: Cleanup
        if: always()
        working-directory: scripts
        run: rm -f service-account.json
